version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://vessel-buys-water-electrical.trycloudflare.com}
        VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-wss://vessel-buys-water-electrical.trycloudflare.com/api/ws}
        VITE_APP_NAME: ${VITE_APP_NAME:-Neura Chat}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_SESSION_TTL: ${VITE_SESSION_TTL:-2592000000}
        NODE_ENV: ${NODE_ENV:-production}
        VITE_MINIO_ACCESS_KEY: ${VITE_MINIO_ACCESS_KEY}
        VITE_MINIO_SECRET_KEY: ${VITE_MINIO_SECRET_KEY}

        VITE_MINIO_BUCKET_NAME: ${VITE_MINIO_BUCKET_NAME:-neura-bucket}
        VITE_MINIO_ENDPOINT: ${VITE_MINIO_ENDPOINT:-http://100.68.50.41:9000}
        VITE_FRONTEND_JWT_TOKEN: ${VITE_FRONTEND_JWT_TOKEN}
    env_file:
      - .env.prod
    platform: linux/amd64
    image: vanhoadotbui2628/neura_frontend:1.6.0
    container_name: neura-frontend
    ports:
      - '3000:80'
    networks:
      - neura-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:80',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  neura-network:
    driver: bridge
