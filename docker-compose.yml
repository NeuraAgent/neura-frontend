version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://chapel-clara-definition-try.trycloudflare.com}
        VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-wss://chapel-clara-definition-try.trycloudflare.com/api/ws}
        VITE_APP_NAME: ${VITE_APP_NAME:-Neura Chat}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_SESSION_TTL: ${VITE_SESSION_TTL:-2592000000}
        NODE_ENV: ${NODE_ENV:-production}
        VITE_AWS_ACCESS_KEY_ID: ${VITE_AWS_ACCESS_KEY_ID}
        VITE_AWS_SECRET_ACCESS_KEY: ${VITE_AWS_SECRET_ACCESS_KEY}
        VITE_AWS_REGION: ${VITE_AWS_REGION:-ap-southeast-2}
        VITE_AWS_S3_BUCKET_NAME: ${VITE_AWS_S3_BUCKET_NAME:-nouraagents}
        VITE_AWS_S3_ENDPOINT: ${VITE_AWS_S3_ENDPOINT:-https://s3.amazonaws.com}
        VITE_FRONTEND_JWT_TOKEN: ${VITE_FRONTEND_JWT_TOKEN}
    env_file:
      - .env.prod
    platform: linux/amd64
    image: vanhoadotbui2628/neura_frontend:1.3.1
    container_name: neura-frontend
    ports:
      - '0.0.0.0:3000:80'
    networks:
      - neura-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:80',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  neura-network:
    driver: bridge
